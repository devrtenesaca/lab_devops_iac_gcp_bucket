name: Infra Container
run-name: "${{ github.actor }}"

on: [ push ]

jobs:
    terraform-jobs:
        runs-on: ubuntu-latest
        container:
            image: hashicorp/terraform:1.7.0 # this is the image of container
        
        steps:
            - name: Checkout
              uses: actions/checkout@v4
        # we don't need setup terraform cos terraform is already installed
            - name: Check Version
              run: run terraform --version

            - name: Terraform init
              run: terraform init -backend=false


        